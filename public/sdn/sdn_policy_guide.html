<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Policy 判定ガイド（準備中）</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--purple:#a78bfa}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif;
    background:var(--bg);color:var(--text);
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    padding:24px;text-align:center;
  }
  .box{max-width:420px}
  .icon{font-size:56px;margin-bottom:16px}
  h1{font-size:22px;font-weight:700;margin-bottom:12px}
  .badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;
    background:rgba(167,139,250,.15);color:var(--purple);margin-bottom:20px}
  p{font-size:14px;color:var(--muted);line-height:1.7}
  code{background:var(--surface);padding:2px 6px;border-radius:6px;font-size:12px;color:var(--purple)}
  .hub-back{
    position:fixed;bottom:20px;right:20px;z-index:9999;background:#1e293b;color:#f1f5f9;
    border:1px solid #475569;border-radius:99px;padding:10px 18px;font-size:14px;font-weight:700;
    text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,.4);display:flex;align-items:center;gap:6px;
    -webkit-tap-highlight-color:transparent;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="icon">🚧</div>
    <div class="badge">P4</div>
    <h1>Policy 判定ガイド</h1>
    <p>
      このページは<strong>準備中</strong>です。<br>
      元サイトのエクスポートに <code>sdn/sdn_policy_guide.html</code> が
      含まれていなかったため、暫定のプレースホルダーを表示しています。<br><br>
      元のHTMLが入手できたら <code>assets/sdn_policy_guide.html</code> を
      差し替えて再ビルドしてください。
    </p>
  </div>
  <a class="hub-back" href="/index.html">🏠 Hub</a>
</body>
</html>
